name: Release-plz

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

jobs:
  release:
    name: release
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.repository == 'cooronx/authzen-rs'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    steps:
      - name: Checkout validated commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Attach validated commit to main branch
        run: |
          git switch -C main
          git branch --set-upstream-to=origin/main main
      - name: Install latest stable Rust
        run: rustup update stable
      - name: Publish crate and GitHub Release
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-pr:
    name: release-pr
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.repository == 'cooronx/authzen-rs'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout validated commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Attach validated commit to main branch
        run: |
          git switch -C main
          git branch --set-upstream-to=origin/main main
      - name: Install latest stable Rust
        run: rustup update stable
      - name: Create or update Release PR
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
